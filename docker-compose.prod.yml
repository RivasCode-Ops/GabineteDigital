services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gabinete-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=https://${DOMAIN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - LOG_LEVEL=info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gabinete-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: gabinete-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER:-gabinete}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME:-gabinete_digital}
      - PGDATABASE=${DB_NAME:-gabinete_digital}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gabinete} -d ${DB_NAME:-gabinete_digital}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gabinete-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: gabinete-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/cloudflare:/etc/nginx/cloudflare:ro
    depends_on:
      - app
    networks:
      - gabinete-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backup:
    image: postgres:16-alpine
    container_name: gabinete-backup
    restart: unless-stopped
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - ./backups:/backups
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-gabinete}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME:-gabinete_digital}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    entrypoint: |
      sh -c "
      chmod +x /usr/local/bin/backup.sh
      echo '0 3 * * * /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root
      crond -f -l 2
      "
    networks:
      - gabinete-net

volumes:
  postgres_data:

networks:
  gabinete-net:
    driver: bridge
